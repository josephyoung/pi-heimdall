name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck extensions
        run: npm run typecheck

      - name: Verify package contents
        run: npm run check:pack

      - name: Read package metadata
        id: pkg
        run: |
          NAME=$(node -e 'console.log(require("./package.json").name)')
          VERSION=$(node -e 'console.log(require("./package.json").version)')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on npm
        id: exists
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already exists on npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.exists.outputs.published != 'true' }}
        run: npm publish --provenance --access public

      - name: Determine bump level
        if: ${{ steps.exists.outputs.published != 'true' }}
        id: bump
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q '\[minor\]'; then
            echo "level=minor" >> "$GITHUB_OUTPUT"
          else
            echo "level=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version for next publish
        if: ${{ steps.exists.outputs.published != 'true' }}
        run: npm version ${{ steps.bump.outputs.level }} --no-git-tag-version

      - name: Commit version bump
        if: ${{ steps.exists.outputs.published != 'true' }}
        run: |
          NEXT_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${NEXT_VERSION} [skip ci]"
          git push origin HEAD:main
