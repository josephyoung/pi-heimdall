name: Publish

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck extensions
        run: npm run typecheck

      - name: Verify package contents
        run: npm run check:pack

      - name: Read package metadata
        id: pkg
        run: node -e 'const pkg = require("./package.json"); console.log(`name=${pkg.name}\nversion=${pkg.version}`)' >> "$GITHUB_OUTPUT"

      - name: Check whether package version changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || echo "$BEFORE" | grep -q '^0*$'; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_VERSION=$(git show "$BEFORE:package.json" | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).version));')
          if [ "$PREVIOUS_VERSION" = "${{ steps.pkg.outputs.version }}" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Version did not change; skipping publish."
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether version already exists on npm
        if: ${{ steps.changed.outputs.version_changed == 'true' }}
        id: exists
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already exists on npm; skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ steps.changed.outputs.version_changed == 'true' && steps.exists.outputs.published != 'true' }}
        run: npm publish --access public
